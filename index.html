<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje Docházka</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9; }
        .btn { padding: 15px 30px; font-size: 20px; color: white; border: none; border-radius: 8px; cursor: pointer; margin: 10px; width: 200px; }
        .btn-in { background-color: #4CAF50; }
        .btn-in:hover { background-color: #45a049; }
        .btn-out { background-color: #f44336; }
        .btn-out:hover { background-color: #da190b; }
    </style>
</head>
<body>

    <h1>Evidence Docházky</h1>

    <button class="btn btn-in">Zapsat příchod</button>
    <button class="btn btn-out">Zapsat odchod</button>

    <p id="status-message" style="font-weight: bold; margin-top: 20px; font-size: 18px;"></p>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const supabaseUrl = 'https://bnnblydnabmmekhuomem.supabase.co';
        const supabaseKey = 'sb_publishable_NRw5GoAEJphwZLSSMTtmWA_xb2ly6FK';
        
        const databaze = window.supabase.createClient(supabaseUrl, supabaseKey);

        const btnIn = document.querySelector('.btn-in');
        const btnOut = document.querySelector('.btn-out');
        const statusMessage = document.getElementById('status-message');

        function getCurrentTime() {
            const now = new Date();
            return String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
        }

        function getCurrentDate() {
            const now = new Date();
            return now.toISOString().split('T')[0]; 
        }

        btnIn.addEventListener('click', async function() {
            const time = getCurrentTime();
            const date = getCurrentDate();
            
            statusMessage.innerText = 'Odesílám do databáze...';
            statusMessage.style.color = 'black';

            const { data, error } = await databaze
                .from('attendance')
                .insert([
                    { date: date, time_in: time, type: 'Office' }
                ]);

            if (error) {
                statusMessage.innerText = 'Chyba: ' + error.message;
                statusMessage.style.color = 'red';
                console.error(error);
            } else {
                statusMessage.innerText = 'Příchod (' + time + ') úspěšně uložen do cloudu!';
                statusMessage.style.color = 'green';
            }
        });

        btnOut.addEventListener('click', function() {
            const time = getCurrentTime();
            statusMessage.innerText = 'Odchod zatím nenapojen. Čas: ' + time;
            statusMessage.style.color = 'orange';
        });
    </script>
</body>
</html>
