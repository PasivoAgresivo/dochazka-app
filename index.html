<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker Docházky</title>
    <style>
        /* Zde je CSS - určuje, jak aplikace vypadá */
        body {
            font-family: Arial, sans-serif;
            max-width: 400px; /* Šířka pro mobilní telefon */
            margin: 20px auto;
            padding: 15px;
            text-align: center;
            background-color: #f9f9f9;
        }
        button {
            padding: 15px 30px;
            font-size: 16px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 80%;
            font-weight: bold;
        }
        .btn-in { 
            background-color: #4CAF50; /* Zelená */
            color: white; 
        }
        .btn-out { 
            background-color: #f44336; /* Červená */
            color: white; 
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: white;
        }
        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>
<body>

    <h1>Moje Docházka</h1>
    
    <div>
        <button class="btn-in">Zapsat příchod</button>
        <button class="btn-out">Zapsat odchod</button>
    </div>

    <hr style="margin: 30px 0;">

    <h3>Historie (Test)</h3>
    <table>
        <tr>
            <th>Datum</th>
            <th>Příchod</th>
            <th>Odchod</th>
        </tr>
        <tr>
            <td>30. 6. 2026</td>
            <td>08:00</td>
            <td>--:--</td>
        </tr>
    </table>

    <p id="status-message" style="font-weight: bold; margin-top: 20px; font-size: 18px;"></p>

    <script>
        
        <!-- Zde se bude zobrazovat zpráva o kliknutí -->
    <p id="status-message" style="font-weight: bold; margin-top: 20px; font-size: 18px;"></p>

    <!-- 1. Nahrajeme oficiální knihovnu Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- 2. Náš upravený JavaScript (logika aplikace) -->
    <script>

        // SEM VLOŽ SVOJE ÚDAJE (adresu bez /rest/v1/ a dlouhý klíč)
        const supabaseUrl = 'https://bnnblydnabmmekhuomem.supabase.co';
        const supabaseKey = 'sb_publishable_NRw5GoAEJphwZLSSMTtmWA_xb2ly6FK';
        
        // Vytvoření připojení k databázi
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const btnIn = document.querySelector('.btn-in');
        const statusMessage = document.getElementById('status-message');

        // Funkce pro získání času (např. 08:15)
        function getCurrentTime() {
            const now = new Date();
            return String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
        }

        // Funkce pro získání dnešního data (formát pro databázi RRRR-MM-DD)
        function getCurrentDate() {
            const now = new Date();
            return now.toISOString().split('T')[0]; 
        }

        // Co se stane, když klikneme na zelené tlačítko (Příchod)
        btnIn.addEventListener('click', async function() {
            const time = getCurrentTime();
            const date = getCurrentDate();
            
            // Uživateli ukážeme, že aplikace pracuje
            statusMessage.innerText = 'Odesílám do databáze...';
            statusMessage.style.color = 'black';

            // Zápis nového řádku do tabulky 'attendance'
            const { data, error } = await supabase
                .from('attendance')
                .insert([
                    { date: date, time_in: time, type: 'Office' }
                ]);

            // Kontrola, jestli se to povedlo
            if (error) {
                statusMessage.innerText = 'Chyba: ' + error.message;
                statusMessage.style.color = 'red';
                console.error(error);
            } else {
                statusMessage.innerText = 'Příchod (' + time + ') úspěšně uložen do cloudu!';
                statusMessage.style.color = 'green';
            }
        });
    </script>
</body>
    
</html>
