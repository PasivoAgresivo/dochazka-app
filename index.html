<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker Docházky</title>
    <style>
        /* Zde je CSS - určuje, jak aplikace vypadá */
        body {
            font-family: Arial, sans-serif;
            max-width: 400px; /* Šířka pro mobilní telefon */
            margin: 20px auto;
            padding: 15px;
            text-align: center;
            background-color: #f9f9f9;
        }
        button {
            padding: 15px 30px;
            font-size: 16px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 80%;
            font-weight: bold;
        }
        .btn-in { 
            background-color: #4CAF50; /* Zelená */
            color: white; 
        }
        .btn-out { 
            background-color: #f44336; /* Červená */
            color: white; 
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: white;
        }
        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>
<body>

    <h1>Moje Docházka</h1>
    
    <div>
        <button class="btn-in">Zapsat příchod</button>
        <button class="btn-out">Zapsat odchod</button>
    </div>

    <hr style="margin: 30px 0;">

    <h3>Historie (Test)</h3>
    <table>
        <tr>
            <th>Datum</th>
            <th>Příchod</th>
            <th>Odchod</th>
        </tr>
        <tr>
            <td>30. 6. 2026</td>
            <td>08:00</td>
            <td>--:--</td>
        </tr>
    </table>

    <p id="status-message" style="font-weight: bold; margin-top: 20px; font-size: 18px;"></p>

    <script>
        // 1. Najdeme naše prvky na stránce (tlačítka a textový odstavec)
        const btnIn = document.querySelector('.btn-in');
        const btnOut = document.querySelector('.btn-out');
        const statusMessage = document.getElementById('status-message');

        // 2. Funkce pro získání aktuálního času (např. 08:15)
        function getCurrentTime() {
            const now = new Date(); // Zjistí přesný aktuální čas v zařízení
            const hours = String(now.getHours()).padStart(2, '0'); // Zajistí, že 8 hodin bude "08"
            const minutes = String(now.getMinutes()).padStart(2, '0');
            return hours + ':' + minutes;
        }

        // 3. Co se stane, když klikneme na zelené tlačítko (Příchod)
        btnIn.addEventListener('click', function() {
            const time = getCurrentTime();
            statusMessage.innerText = 'Příchod zaznamenán v: ' + time;
            statusMessage.style.color = 'green';
        });

        // 4. Co se stane, když klikneme na červené tlačítko (Odchod)
        btnOut.addEventListener('click', function() {
            const time = getCurrentTime();
            statusMessage.innerText = 'Odchod zaznamenán v: ' + time;
            statusMessage.style.color = 'red';
        });
    </script>

</body>
</html>
